services:
  db:
    image: postgres:16-alpine
    container_name: fipe-db
    environment:
      POSTGRES_USER: fipe
      POSTGRES_PASSWORD: fipe
      POSTGRES_DB: fipe
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fipe -d fipe"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fipe-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://fipe:fipe@db:5432/fipe?sslmode=disable
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
